name: Scrape IBJJF Rankings

on:
  # Monthly on the 1st at 12:00 UTC, or manual trigger
  schedule:
    - cron: "0 12 1 * *"
  workflow_dispatch:
    inputs:
      quick:
        description: "Quick mode (adult belts only)"
        required: false
        default: "false"
        type: boolean

jobs:
  scrape-rankings:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run rankings scraper
        run: |
          if [ "${{ inputs.quick }}" = "true" ]; then
            python backend/scrape_rankings.py --quick
          else
            python backend/scrape_rankings.py
          fi
        timeout-minutes: 120  # full scrape can take a while

      - name: Verify output
        run: |
          python3 -c "
          import json
          with open('athletes.json') as f:
              data = json.load(f)
          count = data['athleteCount']
          print(f'athletes.json: {count} athletes')
          assert count >= 100, f'Too few athletes: {count}'
          print('OK')
          "

      - name: Commit updated athletes.json to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add athletes.json
          git diff --staged --quiet || git commit -m "chore: update athletes.json [skip ci]"
          git push
